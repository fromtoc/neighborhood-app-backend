version: '3.9'

# Production docker-compose — tuned for Linode 2GB (2GB RAM, 1 vCPU).
# Memory budget:
#   mysql:    512 MB
#   redis:    128 MB
#   rabbitmq: 300 MB
#   app:      512 MB
#   OS+nginx: ~350 MB  (overhead)
#   ──────────────────
#   total:  ~1802 MB  ✓
#
# All secrets are read from a .env file (never commit .env to git).
# Run: docker compose -f docker-compose.prod.yml up -d

services:

  # ── Infrastructure ─────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: app-mysql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # Bind to localhost only for SSH tunnel access (DBeaver etc.)
    ports:
      - "127.0.0.1:3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=50
      --performance-schema=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3
    container_name: app-rabbitmq
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300m
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-appuser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    expose:
      - "5672"
    # Management UI is NOT exposed in prod; SSH tunnel to access:
    #   ssh -L 15672:localhost:15672 linode-app
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Application ────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: neighborhood-app:latest
    container_name: app-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    # Bind to localhost only — Nginx proxies inbound traffic
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      # JVM: cap heap at 380 MB, leave room for metaspace + threads
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      # DataSource
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-appdb}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE: 4
      SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE: 4
      SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE: 0
      # RabbitMQ
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-appuser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Firebase (optional)
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      # 地址轉座標：Google Geocoding（目前）或 TGOS（之後），擇一在 .env 設定
      # 切換到 TGOS 時：移除 GOOGLE_GEOCODING_API_KEY，改加 TGOS_API_KEY
      GOOGLE_GEOCODING_API_KEY: ${GOOGLE_GEOCODING_API_KEY:-}
      # LINE Login (optional)
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      # On-demand revalidation（通知 Next.js 重新產生頁面）
      WEB_BASE_URL: http://web:3000
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
      AGGREGATOR_NCDR_ENABLED: ${AGGREGATOR_NCDR_ENABLED:-true}
      # Image uploads — Cloudflare R2 (preferred) or local fallback
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    volumes:
      - app_logs:/app/logs
      # Mount Firebase service-account JSON if path is set
      - ${FIREBASE_CREDENTIALS_DIR:-/dev/null}:${FIREBASE_CREDENTIALS_DIR:-/dev/null}:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Frontend (Next.js) ─────────────────────────────────────────

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 在 build 時 bundle 進 JS，必須用 build args 傳入
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: neighborhood-web:latest
    container_name: app-web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300m
    environment:
      NODE_ENV: production
      # API_BASE_URL 供 Server Component 用（container → container，不走公網）
      API_BASE_URL: http://app:8080
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      # On-demand revalidation secret（與後端共用）
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - app

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  app_logs:
