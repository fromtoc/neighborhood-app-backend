spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:mysql://localhost:3306/appdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbmVpZ2hib3Job29k}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 2592000000
  admin:
    # X-Admin-Token header 驗證。留空則停用保護（僅限開發環境）
    token: ${ADMIN_TOKEN:}
  # Firebase Admin SDK.
  # Set the path to your service-account JSON via the environment variable:
  #   FIREBASE_CREDENTIALS_PATH=/path/to/service-account.json
  # NEVER commit the JSON file to the repo.
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

# 地址轉座標服務（擇一設定，TGOS 優先）
#
# ── Google Geocoding API（目前使用）──────────────────────────────
# 申請：https://console.cloud.google.com/ → Geocoding API
# 設定環境變數 GOOGLE_GEOCODING_API_KEY，再取消下方區塊的註解。
google:
  geocoding:
    api-key: ${GOOGLE_GEOCODING_API_KEY:}
#
# ── TGOS 地址查詢（預計切換）────────────────────────────────────
# 申請：https://api.tgos.tw/
# 設定環境變數 TGOS_API_KEY，再取消下方區塊的註解（並將 Google 區塊重新註解）。
# tgos:
#   api-key: ${TGOS_API_KEY}

# LINE Login.
# Set environment variables LINE_CHANNEL_ID and LINE_CHANNEL_SECRET to activate.
line:
  channel-id: ${LINE_CHANNEL_ID:}
  channel-secret: ${LINE_CHANNEL_SECRET:}
  # Optionally override endpoints (defaults shown):
  # token-endpoint: https://api.line.me/oauth2/v2.1/token
  # verify-endpoint: https://api.line.me/oauth2/v2.1/verify

web:
  # Next.js container URL（Docker Compose 內部通訊，空字串則停用）
  base-url: ${WEB_BASE_URL:}
  # 與 Next.js /api/revalidate 共用的 secret
  revalidate-secret: ${REVALIDATE_SECRET:}\n\naggregator:\n  ncdr:\n    # 設為 true 啟用 NCDR 防災資訊定時爬蟲\n    enabled: ${AGGREGATOR_NCDR_ENABLED:false}\n    # 每次執行間隔（ms），預設 30 分鐘\n    interval-ms: ${AGGREGATOR_NCDR_INTERVAL_MS:1800000}\n    # 啟動後多久首次執行（ms），預設 15 秒\n    initial-delay-ms: ${AGGREGATOR_NCDR_INITIAL_DELAY_MS:15000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} -- %msg%n"
  level:
    root: INFO
    com.example.app: DEBUG
