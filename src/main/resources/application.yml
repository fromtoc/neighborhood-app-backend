spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:mysql://localhost:3306/appdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbmVpZ2hib3Job29k}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 2592000000
  admin:
    # X-Admin-Token header 驗證。留空則停用保護（僅限開發環境）
    token: ${ADMIN_TOKEN:}
  # Firebase Admin SDK.
  # Set the path to your service-account JSON via the environment variable:
  #   FIREBASE_CREDENTIALS_PATH=/path/to/service-account.json
  # NEVER commit the JSON file to the repo.
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

# 地址轉座標服務（擇一設定，TGOS 優先）
#
# ── Google Geocoding API（目前使用）──────────────────────────────
# 申請：https://console.cloud.google.com/ → Geocoding API
# 設定環境變數 GOOGLE_GEOCODING_API_KEY，再取消下方區塊的註解。
google:
  geocoding:
    api-key: ${GOOGLE_GEOCODING_API_KEY:}
#
# ── TGOS 地址查詢（預計切換）────────────────────────────────────
# 申請：https://api.tgos.tw/
# 設定環境變數 TGOS_API_KEY，再取消下方區塊的註解（並將 Google 區塊重新註解）。
# tgos:
#   api-key: ${TGOS_API_KEY}

# LINE Login.
# Set environment variables LINE_CHANNEL_ID and LINE_CHANNEL_SECRET to activate.
line:
  channel-id: ${LINE_CHANNEL_ID:}
  channel-secret: ${LINE_CHANNEL_SECRET:}
  # Optionally override endpoints (defaults shown):
  # token-endpoint: https://api.line.me/oauth2/v2.1/token
  # verify-endpoint: https://api.line.me/oauth2/v2.1/verify

web:
  # Next.js container URL（Docker Compose 內部通訊，空字串則停用）
  base-url: ${WEB_BASE_URL:}
  # 與 Next.js /api/revalidate 共用的 secret
  revalidate-secret: ${REVALIDATE_SECRET:}

cwa:
  api-key: ${CWA_API_KEY:CWA-000248A6-64BE-4F2D-B284-DC2E4E9EAE2D}

aggregator:
  ncdr:
    enabled: ${AGGREGATOR_NCDR_ENABLED:true}
    interval-ms: ${AGGREGATOR_NCDR_INTERVAL_MS:300000}
    initial-delay-ms: ${AGGREGATOR_NCDR_INITIAL_DELAY_MS:5000}

  # 環保署 AQI 空氣品質（每 1 小時，AQI >= 100 才通知）
  aqi:
    enabled: ${AGGREGATOR_AQI_ENABLED:true}
    api-key: ${EPA_AQI_API_KEY:080b22e2-b6be-4810-8ffd-9c4efc327502}
    interval-ms: ${AGGREGATOR_AQI_INTERVAL_MS:3600000}
    initial-delay-ms: ${AGGREGATOR_AQI_INITIAL_DELAY_MS:60000}

  # 中央氣象署 氣象特報（每 30 分鐘）
  cwa-alert:
    enabled: ${AGGREGATOR_CWA_ALERT_ENABLED:true}
    interval-ms: ${AGGREGATOR_CWA_ALERT_INTERVAL_MS:1800000}
    initial-delay-ms: ${AGGREGATOR_CWA_ALERT_INITIAL_DELAY_MS:45000}

  # 水利署 水情公告（每 3 小時，opendata.wra.gov.tw 目前 503 暫停）
  water-alert:
    enabled: ${AGGREGATOR_WATER_ALERT_ENABLED:false}
    interval-ms: ${AGGREGATOR_WATER_ALERT_INTERVAL_MS:10800000}
    initial-delay-ms: ${AGGREGATOR_WATER_ALERT_INITIAL_DELAY_MS:90000}

  # 疾管署 傳染病公告（每 6 小時）
  cdc-alert:
    enabled: ${AGGREGATOR_CDC_ALERT_ENABLED:true}
    interval-ms: ${AGGREGATOR_CDC_ALERT_INTERVAL_MS:21600000}
    initial-delay-ms: ${AGGREGATOR_CDC_ALERT_INITIAL_DELAY_MS:120000}

  # 中央氣象署地震報告（每 3 分鐘，震度 >= 2 才通知）
  earthquake:
    enabled: ${AGGREGATOR_EARTHQUAKE_ENABLED:true}
    interval-ms: ${AGGREGATOR_EARTHQUAKE_INTERVAL_MS:180000}
    initial-delay-ms: ${AGGREGATOR_EARTHQUAKE_INITIAL_DELAY_MS:30000}

  # 台北市開放資料 里辦公室活動（data.taipei.gov.tw DNS 無法解析，暫停）
  taipei-event:
    enabled: ${AGGREGATOR_TAIPEI_EVENT_ENABLED:false}
    interval-ms: ${AGGREGATOR_TAIPEI_EVENT_INTERVAL_MS:21600000}
    initial-delay-ms: ${AGGREGATOR_TAIPEI_EVENT_INITIAL_DELAY_MS:150000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} -- %msg%n"
  level:
    root: INFO
    com.example.app: DEBUG
